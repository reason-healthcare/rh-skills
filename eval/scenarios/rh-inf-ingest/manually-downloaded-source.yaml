name: manually-downloaded-source
skill: rh-inf-ingest
description: >
  Discovery plan has two sources: acc-aha-htn-guideline-2017 (open access,
  already downloaded to sources/ by a prior run) and jnc8-2014 (access:
  manual, PDF placed in sources/ by the user). Neither has been normalized,
  classified, or annotated yet. The agent must plan and implement a full
  ingest cycle for both pre-placed files — normalizing, classifying, and
  annotating both — then verify.

  Fixture files (copied from eval/scenarios/rh-inf-ingest/manually-downloaded-source/):
    sources/jnc8-2014.pdf  — JNC 8 hypertension guidelines (raw PDF, pre-placed by user)

topic: young-adult-hypertension

workspace:
  tracking_yaml: |
    schema_version: "1.0"
    topics:
      young-adult-hypertension:
        state: discovery_planned
        events:
          - event: topic_initialized
            timestamp: "2026-04-10T00:00:00Z"
          - event: discovery_planned
            timestamp: "2026-04-12T00:00:00Z"
    sources: []
    events: []

  files:
    - path: topics/young-adult-hypertension/process/plans/discovery-plan.yaml
      content: |
        topic: young-adult-hypertension
        clinical_question: >
          What are the diagnostic thresholds, treatment targets, and lifestyle
          interventions for hypertension in adults aged 18–39?
        sources:
          - id: acc-aha-htn-guideline-2017
            title: "2017 ACC/AHA Guideline for the Prevention, Detection, Evaluation,
              and Management of High Blood Pressure in Adults"
            url: https://www.ahajournals.org/doi/10.1161/HYP.0000000000000065
            type: clinical-guideline
            evidence_level: ia
            rationale: Primary ACC/AHA 2017 guideline defining 130/80 mmHg threshold.
            open_access: true
          - id: jnc8-2014
            title: "2014 Evidence-Based Guideline for the Management of High Blood
              Pressure in Adults (JNC 8)"
            url: https://jamanetwork.com/journals/jama/fullarticle/1791497
            type: clinical-guideline
            evidence_level: ia
            rationale: Older JNC 8 guideline defining 140/90 threshold; contrast with ACC/AHA 2017.
            open_access: false
            access: manual
        status: approved

    - path: sources/acc-aha-htn-guideline-2017.txt
      content: |
        2017 ACC/AHA/AAPA/ABC/ACPM/AGS/APhA/ASH/ASPC/NMA/PCNA Guideline
        for the Prevention, Detection, Evaluation, and Management of High
        Blood Pressure in Adults (excerpt)

        DEFINITION AND CLASSIFICATION

        Normal blood pressure: SBP <120 mmHg AND DBP <80 mmHg
        Elevated blood pressure: SBP 120–129 mmHg AND DBP <80 mmHg
        Stage 1 hypertension: SBP 130–139 mmHg OR DBP 80–89 mmHg (Class I; Evidence: B-NR)
        Stage 2 hypertension: SBP ≥140 mmHg OR DBP ≥90 mmHg (Class I; Evidence: B-NR)

        KEY CHANGE FROM JNC 7: Threshold lowered from 140/90 to 130/80 mmHg for Stage 1 HTN.

        TREATMENT TARGETS

        For most hypertensive adults: SBP target <130 mmHg and DBP <80 mmHg (Class I; Evidence: A)
        For adults aged ≥65 with hypertension: SBP target <130 mmHg (Class I; Evidence: B-R)

        NON-PHARMACOLOGICAL INTERVENTIONS (Class I for all stages)

        - DASH dietary pattern (reduces SBP by 11 mmHg in hypertensive adults)
        - Weight reduction (1 mmHg reduction per kg lost)
        - Sodium restriction to <1,500 mg/day
        - Aerobic exercise: 90–150 min/week of moderate-intensity activity
        - Limit alcohol: ≤1 drink/day women, ≤2 drinks/day men

        PHARMACOLOGICAL THERAPY — STAGE 1 (130–139/80–89 mmHg)

        Initiate drug therapy when: 10-year ASCVD risk ≥10% AND lifestyle modifications insufficient.
        First-line agents: thiazide diuretics, ACE inhibitors, ARBs, CCBs (Class I; Evidence: A)

        PHARMACOLOGICAL THERAPY — STAGE 2 (≥140/90 mmHg)

        Initiate 2-drug combination for most patients (Class I; Evidence: B-R)
        BP ≥160/100: initiate 2-drug combination plus lifestyle modification

prompt: |
  Use the rh-inf-ingest skill for the topic `young-adult-hypertension`.

  Working directory: {workdir}
  Topic: {topic}

  A validated discovery plan is at
  `topics/young-adult-hypertension/process/plans/discovery-plan.yaml` with
  two sources:
    - acc-aha-htn-guideline-2017 — open access; the file is already at
      sources/acc-aha-htn-guideline-2017.txt (downloaded previously)
    - jnc8-2014 — access: manual; the PDF is already at sources/jnc8-2014.pdf

  Both files are pre-placed in sources/ and do not need to be downloaded.

  Run the full ingest cycle:
  1. **plan** — summarise both sources; confirm both files are present in sources/
  2. **implement** — register, normalize, classify, and annotate both sources
  3. **verify** — confirm both sources are ingested and concepts.yaml is valid

expected_outputs:
  - path: sources/normalized/acc-aha-htn-guideline-2017.md
    checks:
      - exists
  - path: sources/normalized/jnc8-2014.md
    checks:
      - exists
  - path: topics/young-adult-hypertension/process/concepts.yaml
    checks:
      - exists
      - contains: "concepts:"
  - path: tracking.yaml
    checks:
      - event: ingest_complete

efficiency_focus:
  - "Does the agent use rh-skills ingest implement <file> for both pre-placed sources?"
  - "Does it avoid trying to download any source (both are already in sources/)?"
  - "Does it classify and annotate both sources via CLI (not inline YAML)?"
  - "Does it recognize access: manual for jnc8-2014 and not attempt to download it?"

quality_focus:
  - "Both sources present in sources/normalized/ as .md files"
  - "acc-aha-htn-guideline-2017 contains 130/80 mmHg diagnostic threshold"
  - "jnc8-2014 normalization note: text_extracted field present in frontmatter"
  - "Classification appropriate for both clinical guidelines (evidence_level: ia)"
  - "concepts.yaml contains hypertension-relevant terms (blood pressure, HTN, DASH diet)"
  - "rh-skills ingest verify reports zero errors"
