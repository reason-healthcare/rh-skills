name: manually-downloaded-source
skill: rh-inf-extract
description: >
  Discovery and ingest ran for one source (acc-aha-htn-guideline-2017, fully
  normalized via rh-inf-ingest). After ingest completed the user manually
  downloaded a second source (jnc8-2014.pdf) and placed it in sources/ —
  it is tracked in tracking.yaml with normalized: false but rh-inf-ingest has
  NOT been re-run to normalize it.

  The agent must detect the un-normalized source, warn that it needs to be
  run through rh-inf-ingest first, exclude it from the extract plan, and
  proceed with only the one normalized source.

  Fixture files (copied from eval/scenarios/rh-inf-extract/manually-downloaded-source/):
    sources/jnc8-2014.pdf  — JNC 8 hypertension guidelines (raw PDF, not yet ingested)

topic: young-adult-hypertension

workspace:
  tracking_yaml: |
    schema_version: "1.0"
    topics:
      young-adult-hypertension:
        state: ingest_complete
        events:
          - event: topic_initialized
            timestamp: "2026-04-10T00:00:00Z"
          - event: discovery_planned
            timestamp: "2026-04-12T00:00:00Z"
          - event: ingest_complete
            timestamp: "2026-04-14T00:00:00Z"
    sources:
      - id: acc-aha-htn-guideline-2017
        normalized: true
        classified: true
        annotated: true
        path: sources/normalized/acc-aha-htn-guideline-2017.md
      - id: jnc8-2014
        normalized: false
        path: sources/jnc8-2014.pdf

  files:
    - path: topics/young-adult-hypertension/process/plans/discovery-plan.yaml
      content: |
        topic: young-adult-hypertension
        clinical_question: >
          What are the diagnostic thresholds, treatment targets, and lifestyle
          interventions for hypertension in adults aged 18–39?
        sources:
          - id: acc-aha-htn-guideline-2017
            title: "2017 ACC/AHA Guideline for the Prevention, Detection, Evaluation,
              and Management of High Blood Pressure in Adults"
            url: https://www.ahajournals.org/doi/10.1161/HYP.0000000000000065
            type: clinical-guideline
            evidence_level: ia
            rationale: Primary ACC/AHA 2017 guideline defining 130/80 mmHg threshold.
            open_access: true
          - id: jnc8-2014
            title: "2014 Evidence-Based Guideline for the Management of High Blood
              Pressure in Adults (JNC 8)"
            url: https://jamanetwork.com/journals/jama/fullarticle/1791497
            type: clinical-guideline
            evidence_level: ia
            rationale: Older JNC 8 guideline defining 140/90 threshold; contrast with ACC/AHA 2017.
            open_access: false
            access: manual
        status: approved

    - path: sources/normalized/acc-aha-htn-guideline-2017.md
      content: |
        # 2017 ACC/AHA High Blood Pressure Guideline

        ## Diagnostic Thresholds

        Hypertension is now defined as a systolic BP ≥130 mmHg or diastolic BP ≥80 mmHg
        (Evidence: B-NR). This replaces the prior JNC 7 threshold of 140/90 mmHg.

        Blood pressure categories:
        - Normal: <120/<80 mmHg
        - Elevated: 120–129/<80 mmHg
        - Stage 1 Hypertension: 130–139/80–89 mmHg
        - Stage 2 Hypertension: ≥140/≥90 mmHg

        ## Treatment Targets

        For adults aged 18–39 with confirmed hypertension (Stage 1 or 2), initiate
        lifestyle modifications. Pharmacotherapy is recommended for Stage 2 or if
        10-year CVD risk ≥10% with Stage 1 (Evidence: A).

        Blood pressure goal: <130/80 mmHg for most adults including those with
        established CVD, CKD, or diabetes (Evidence: B-R).

        ## Lifestyle Modifications

        Non-pharmacological interventions include:
        - DASH diet: reduces SBP by 11 mmHg
        - Sodium reduction (<1,500 mg/day): reduces SBP by 5–6 mmHg
        - Physical activity (90–150 min/week): reduces SBP by 4–5 mmHg
        - Weight loss (1 kg): reduces SBP by ~1 mmHg
        - Limit alcohol: reduces SBP by 4 mmHg

    - path: topics/young-adult-hypertension/process/concepts.yaml
      content: |
        topic: young-adult-hypertension
        concepts:
          - term: hypertension
            aliases: [high blood pressure, HTN]
            category: condition
          - term: systolic blood pressure
            aliases: [SBP]
            category: measurement
          - term: diastolic blood pressure
            aliases: [DBP]
            category: measurement
          - term: DASH diet
            aliases: [dietary approaches to stop hypertension]
            category: intervention

prompt: |
  Use the rh-inf-extract skill for the topic `young-adult-hypertension`.

  Working directory: {workdir}
  Topic: {topic}

  One source is fully normalized: `acc-aha-htn-guideline-2017`.
  A second source `jnc8-2014` was manually downloaded after ingest; it is tracked
  in tracking.yaml with `normalized: false` and exists as a raw PDF at
  `sources/jnc8-2014.pdf`.

  Run the full extract cycle:
  1. **plan** — generate an extract plan; handle the un-normalized source correctly
  2. Wait for reviewer approval (simulate approval by responding "approved")
  3. **implement** — produce the L2 structured artifact for the approved plan
  4. **verify** — validate the artifact with rh-skills validate

expected_outputs:
  - path: topics/young-adult-hypertension/process/plans/extract-plan.md
    checks:
      - exists
      - contains: "acc-aha-htn-guideline-2017"
      - contains: "jnc8-2014"   # should be mentioned (as excluded/un-normalized)
  - path: tracking.yaml
    checks:
      - event: extract_planned
      - event: extract_complete

efficiency_focus:
  - "Does the agent detect jnc8-2014 as normalized: false in tracking.yaml without reading the PDF?"
  - "Does it emit a warning about the un-normalized source rather than silently skipping it?"
  - "Does it proceed with only acc-aha-htn-guideline-2017 (the normalized source)?"
  - "Does it avoid attempting to read or parse jnc8-2014.pdf?"

quality_focus:
  - "Warning: agent explicitly notes jnc8-2014 is not yet ingested and will be excluded"
  - "Ingest guidance: agent recommends running rh-inf-ingest implement to normalize jnc8-2014 before extraction"
  - "Plan scope: extract plan covers only the acc-aha-htn-guideline-2017 content"
  - "L2 artifact includes diagnostic thresholds (130/80 mmHg ACC/AHA 2017 threshold)"
  - "L2 artifact includes treatment target (<130/80 mmHg) and lifestyle interventions"
  - "Evidence traceability present for each major claim"
  - "rh-skills validate passes with no errors"
  - "Note in plan: jnc8-2014 excluded pending normalization via rh-inf-ingest"
