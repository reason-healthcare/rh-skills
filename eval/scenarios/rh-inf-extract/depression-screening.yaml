        # USPSTF Recommendation: Screening for Depression in Adults (2023)

        ## Clinical Question and Scope

        **Population**: Adults aged 18 years or older, including pregnant and
        postpartum persons, presenting to primary care settings without a
        recognized diagnosis of depression or current treatment.

        **Intervention**: Screening with a validated depression screening
        instrument followed by diagnostic assessment and treatment for those
        who screen positive.

        **Comparison**: No systematic screening (case-finding only when clinical
        suspicion arises).

        **Outcomes**: Reduction in depression prevalence, improved functional
        status, reduced suicidality, potential harms of false-positive screening.

        **Timing**: Screening at periodic intervals; evidence supports annual
        screening or screening at each clinical encounter when systems support
        adequate follow-up.

        **Setting**: Primary care, including obstetric and postpartum settings.

        The USPSTF recommends screening for depression in the general adult
        population, including pregnant and postpartum persons (Grade B recommendation).

        ## Screening Instruments

        ### PHQ-2 (Patient Health Questionnaire-2)

        Two-item questionnaire used as initial screening step.

        1. Little interest or pleasure in doing things?
        2. Feeling down, depressed, or hopeless?

        Each item scored 0 (not at all) to 3 (nearly every day). Total score
        range: 0–6. A score of ≥3 triggers full PHQ-9 assessment.

        Sensitivity: 83%; Specificity: 92% at cutoff ≥3.

        ### PHQ-9 (Patient Health Questionnaire-9)

        Nine-item instrument for depression severity assessment. Items cover:
        1. Little interest or pleasure in doing things
        2. Feeling down, depressed, or hopeless
        3. Trouble falling or staying asleep, or sleeping too much
        4. Feeling tired or having little energy
        5. Poor appetite or overeating
        6. Feeling bad about yourself or that you are a failure
        7. Trouble concentrating on things
        8. Moving or speaking slowly, or being fidgety/restless
        9. Thoughts that you would be better off dead or of hurting yourself

        Each item scored 0–3. Total score range: 0–27.

        **Scoring Interpretation**:
        - 0–4: Minimal depression (no treatment)
        - 5–9: Mild depression (watchful waiting)
        - 10–14: Moderate depression (treatment planning)
        - 15–19: Moderately severe depression (active treatment)
        - 20–27: Severe depression (immediate intervention, consider referral)

        A score ≥10 has 88% sensitivity and 88% specificity for major
        depressive disorder.

        ### GAD-7 (Generalized Anxiety Disorder-7)

        Often administered alongside PHQ-9 for comorbid anxiety assessment.
        Seven items scored 0–3, total range 0–21.

        - 0–4: Minimal anxiety
        - 5–9: Mild anxiety
        - 10–14: Moderate anxiety
        - 15–21: Severe anxiety

        ## Eligibility Criteria

        Screening is recommended for:
        - Adults aged ≥18 years
        - No current diagnosis of depression
        - No current antidepressant treatment
        - Presenting to a primary care setting
        - Systems in place for adequate follow-up (diagnosis, treatment, monitoring)

        Screening is NOT recommended when:
        - Adequate follow-up systems are not available
        - Patient has a documented current major depressive disorder diagnosis

