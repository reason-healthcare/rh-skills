prompt: |
  Use the rh-inf-extract skill for the topic `depression-screening`.

  Working directory: {workdir}
  Topic: {topic}

  One source is fully ingested: `uspstf-depression-2023`. It contains:
  - PICOTS framing of the clinical question (population, intervention,
    comparison, outcomes, timing, setting)
  - Validated assessment instruments (PHQ-2, PHQ-9, GAD-7) with scoring
  - Eligibility criteria for screening

  Run the full extract cycle:
  1. **plan** — generate an extract plan identifying artifact candidates;
     the plan SHOULD propose at least a `clinical-frame` artifact (PICOTS),
     an `assessment` artifact (PHQ-9), and an `eligibility-criteria` artifact
  2. Wait for reviewer approval (simulate approval by responding "approved")
  3. **implement** — produce the L2 structured artifacts via rh-skills promote derive
  4. **verify** — validate each artifact with rh-skills validate

expected_outputs:
  - path: topics/depression-screening/process/plans/extract-plan.yaml
    checks:
      - exists
      - contains: "clinical-frame"
      - contains: "assessment"
  - path: topics/depression-screening/structured
    checks:
      - exists
      - contains_any_file_with: "artifact_type: clinical-frame"
      - contains_any_file_with: "artifact_type: assessment"
      - contains_any_file_with: "frames:"
      - contains_any_file_with: "items:"
      - contains_any_file_with: "scoring:"
  - path: tracking.yaml
    checks:
      - event: extract_planned
      - event: structured_derived

efficiency_focus:
  - "Does the agent recognize PHQ-9 content as an assessment artifact (not generic evidence-summary)?"
  - "Does the agent recognize the PICOTS structure as a clinical-frame artifact?"
  - "Does it use rh-skills promote derive with correct artifact_type for each?"
  - "Does it avoid re-reading the source file more than once?"

quality_focus:
  - "Does the extract plan propose at least clinical-frame, assessment, and eligibility-criteria types?"
  - "Does the clinical-frame artifact contain PICOTS fields (population, intervention, comparison, outcomes, timing, setting)?"
  - "Does the assessment artifact contain instrument metadata, items with options, and scoring ranges?"
  - "Are the PHQ-9 scoring thresholds accurately captured (0-4 minimal, 5-9 mild, 10-14 moderate, 15-19 moderately severe, 20-27 severe)?"
  - "Does the eligibility-criteria artifact capture both inclusion and exclusion conditions?"
  - "Is evidence_traceability present linking claims to uspstf-depression-2023?"
  - "Does rh-skills validate report zero errors on each artifact?"
