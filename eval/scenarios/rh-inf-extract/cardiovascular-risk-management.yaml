prompt: |
  Use the rh-inf-extract skill for the topic `cvd-risk-management`.

  Working directory: {workdir}
  Topic: {topic}

  One source is fully ingested: `acc-aha-lipid-2023`. It contains:
  - Major and risk-enhancing factor lists for ASCVD
  - Statin exclusion criteria (absolute and relative contraindications)
  - A three-stage treatment decision algorithm with thresholds
  - Graded evidence summaries from two meta-analyses

  Run the full extract cycle:
  1. **plan** — generate an extract plan identifying artifact candidates;
     the plan SHOULD propose at least an `evidence-summary` artifact (with
     risk_factors section) and a `decision-table` artifact (with eligibility
     and exclusion conditions)
  2. Wait for reviewer approval (simulate approval by responding "approved")
  3. **implement** — produce the L2 structured artifacts via rh-skills promote derive
  4. **verify** — validate each artifact with rh-skills validate

expected_outputs:
  - path: topics/cvd-risk-management/process/plans/extract-plan.yaml
    checks:
      - exists
      - contains: "evidence-summary"
      - contains: "decision-table"
  - path: topics/cvd-risk-management/structured
    checks:
      - exists
      - contains_any_file_with: "artifact_type: evidence-summary"
      - contains_any_file_with: "artifact_type: decision-table"
      - contains_any_file_with: "risk_factors:"
      - contains_any_file_with: "events:"
      - contains_any_file_with: "conditions:"
      - contains_any_file_with: "evidence:"
  - path: tracking.yaml
    checks:
      - event: extract_planned
      - event: structured_derived

efficiency_focus:
  - "Does the agent recognize risk factors as a section within evidence-summary (not a standalone artifact)?"
  - "Does the agent fold eligibility and exclusion criteria into decision-table conditions?"
  - "Does the agent recognize GRADE-rated evidence with effect sizes as evidence-summary?"
  - "Does it use rh-skills promote derive with correct artifact_type for each?"

quality_focus:
  - "Does the extract plan propose at least evidence-summary and decision-table types?"
  - "Does the evidence-summary artifact include a risk_factors section separating major from risk-enhancing factors?"
  - "Does the decision-table conditions include eligibility and exclusion logic?"
  - "Does the decision-table capture explicit triggering events, clinical thresholds, and branching logic?"
  - "Does the evidence-summary artifact include source, design, GRADE rating, and quantitative findings (RR, CI, NNH)?"
  - "Are the specific numeric thresholds from the guideline accurately captured (LDL ≥190, risk ≥20%, etc.)?"
  - "Is evidence_traceability present linking claims to acc-aha-lipid-2023?"
  - "Does rh-skills validate report zero errors on each artifact?"
