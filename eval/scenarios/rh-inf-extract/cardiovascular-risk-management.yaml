  Cardiovascular disease risk management guideline — source contains risk
  factor stratification, treatment exclusion criteria, clinical decision
  points, and graded evidence summaries. Exercises evidence-summary (with
  risk factors), decision-table (with eligibility/exclusion conditions),
  and evidence-summary artifact types.

