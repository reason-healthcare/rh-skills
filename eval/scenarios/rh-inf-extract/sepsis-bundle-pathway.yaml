        # Surviving Sepsis Campaign: International Guidelines 2021

        ## Definition and Diagnosis

        **Sepsis** is defined as life-threatening organ dysfunction caused by a
        dysregulated host response to infection (Sepsis-3, Singer et al. 2016).

        **Septic shock** is a subset of sepsis with circulatory and cellular/metabolic
        dysfunction associated with a higher mortality. Operationally defined as
        requiring vasopressors to maintain MAP ≥65 mmHg AND serum lactate >2 mmol/L
        after adequate fluid resuscitation.

        ### Diagnostic Criteria

        - Suspected or documented infection PLUS
        - Acute change in total SOFA score ≥2 points (organ dysfunction)
        - qSOFA (quick SOFA) for bedside screening: ≥2 of the following —
          altered mentation (GCS <15), systolic BP ≤100 mmHg, respiratory rate ≥22

        ### Relevant ICD-10 Codes

        - A41.9 — Sepsis, unspecified organism
        - R65.20 — Severe sepsis without septic shock
        - R65.21 — Severe sepsis with septic shock
        - A40.0–A40.9 — Streptococcal sepsis
        - A41.01 — Sepsis due to Methicillin susceptible Staphylococcus aureus

        ### Relevant LOINC Codes

        - 2524-7 — Lactate [Moles/volume] in Serum or Plasma
        - 600-7 — Bacteria identified in Blood by Culture
        - 33762-6 — Natriuretic peptide B [Mass/volume] in Serum or Plasma (proBNP)

        ## Hour-1 Bundle (to be initiated within 1 hour of sepsis recognition)

        The following interventions must begin within 1 hour of sepsis recognition.
        "Begin" means the order is placed and the first action has started — it does
        not require completion within 1 hour.

        ### Step 1: Measure Lactate Level

        - Order serum lactate (LOINC 2524-7).
        - If initial lactate is >2 mmol/L, re-measure within 2–4 hours to guide
          resuscitation (Strong recommendation, low quality of evidence).

        ### Step 2: Obtain Blood Cultures Before Antibiotics

        - Obtain at least 2 sets of blood cultures (aerobic and anaerobic) before
          administering antimicrobials (Best practice statement).
        - Do NOT delay antimicrobials if cultures cannot be obtained promptly.

        ### Step 3: Administer Broad-Spectrum Antibiotics

        - Administer empiric broad-spectrum antimicrobials within 1 hour of sepsis
          recognition (Strong recommendation, moderate quality of evidence).
        - De-escalate once culture results and sensitivities are available.
        - For septic shock: antimicrobials within 1 hour is CRITICAL — each hour
          of delay is associated with measurable increases in mortality.

        ### Step 4: Begin Rapid Fluid Resuscitation

        - Administer 30 mL/kg crystalloid for hypotension or lactate ≥4 mmol/L
          (Strong recommendation, low quality of evidence).
        - Begin within 1 hour; complete within 3 hours.
        - Reassess volume status and tissue perfusion frequently.

        ### Step 5: Apply Vasopressors

        - If hypotension persists during or after fluid resuscitation, start
          vasopressors to maintain MAP ≥65 mmHg (Strong recommendation, moderate
          quality of evidence).
        - First-line agent: norepinephrine.
        - Second-line agent: vasopressin (up to 0.03 U/min) as adjunct.

        ## Hour-3 Reassessment

        Within 3 hours of sepsis recognition:

        1. Reassess volume status using dynamic measures (passive leg raise,
           fluid challenge, stroke volume variation) — NOT static CVP alone.
        2. If lactate was initially elevated, repeat lactate measurement.
        3. Document clinical response: MAP, urine output, capillary refill,
           mental status.
        4. If patient not improving: consider broadening antimicrobial coverage,
           source control imaging, and ICU consultation.

        ## Evidence Grades

        | Recommendation | Strength | Quality |
        |---------------|----------|---------|
        | Measure lactate within 1h | Strong | Low |
        | Blood cultures before antibiotics | Best practice | N/A |
        | Antibiotics within 1h | Strong | Moderate |
        | 30 mL/kg crystalloid for hypotension/lactate ≥4 | Strong | Low |
        | Norepinephrine first-line vasopressor | Strong | Moderate |
        | Reassess within 3h | Strong | Low |

