prompt: |
  Use the rh-inf-extract skill for the topic `sepsis-management`.

  Working directory: {workdir}
  Topic: {topic}

  One source is fully ingested: `ssc-bundle-2021`. It contains:
  - A timed sequential care pathway (hour-1 bundle with 5 ordered steps,
    hour-3 reassessment with 4 ordered steps)
  - Terminology: ICD-10 sepsis codes and LOINC lab codes
  - Evidence summary with recommendation grades

  Run the full extract cycle:
  1. **plan** — generate an extract plan identifying artifact candidates;
     the plan SHOULD propose at least a `care-pathway` artifact (the timed
     bundle steps), a `terminology` artifact (ICD-10 and LOINC codes), and
     an `evidence-summary` artifact
  2. Wait for reviewer approval (simulate approval by responding "approved")
  3. **implement** — produce the L2 structured artifacts via rh-skills promote derive
  4. **verify** — validate each artifact with rh-skills validate

