  - "Does the agent recognize the timed bundle as a care-pathway (not a decision-table)?"
  - "Does the agent recognize the ICD-10 and LOINC codes as a terminology artifact?"
  - "Does it use rh-skills promote derive with correct artifact_type for each?"
  - "Does it avoid re-reading the source file more than once?"
  - "Does it run sequential approve calls (not parallel)?"

quality_focus:
  - "Does the extract plan propose at least care-pathway, terminology, and evidence-summary?"
  - "Does the care-pathway artifact have triggers (sepsis recognition) and ordered steps with actor and timing?"
  - "Does the care-pathway capture both the hour-1 bundle (5 steps) and hour-3 reassessment (4 steps)?"
  - "Does the step ordering reflect clinical priority (lactate → cultures → antibiotics → fluids → vasopressors)?"
  - "Does the terminology artifact include ICD-10 codes (A41.9, R65.20, R65.21) and LOINC codes (2524-7, 600-7)?"
  - "Does the terminology use correct system URIs (http://hl7.org/fhir/sid/icd-10-cm, http://loinc.org)?"
  - "Does the evidence-summary artifact capture recommendation strength and evidence quality grades?"
  - "Is evidence_traceability present linking claims to ssc-bundle-2021?"
  - "Does rh-skills validate report zero errors on each artifact?"
