quality_focus:
  - "Does the extract plan propose multiple decision-table artifacts to capture the layered logic?"
  - "Does at least one decision-table capture the CHA₂DS₂-VASc → eligibility → drug class → renal adjustment cascade?"
  - "Are CrCl thresholds accurately captured as condition values (≥50, 30–49, 15–29, <15)?"
  - "Are the DOAC-specific dose adjustments present in the rules (e.g., dabigatran 75mg BID for CrCl 30–49)?"
  - "Does a bridging decision-table capture the risk-stratified logic (low vs high thromboembolic risk, valve status)?"
  - "Does the DOAC hold timing by renal function appear somewhere (24h/48h/36h/72h/48h/96h grid)?"
  - "Are special population modifiers (elderly, obesity, dialysis) captured — either as additional conditions in the main tables or as a separate artifact?"
  - "Does each artifact have evidence_traceability linking to Class/LOE from the evidence summary table?"
  - "Are YAML values properly quoted (e.g., \">=50 mL/min\", \"<15 mL/min\")?"
  - "Does rh-skills validate report zero errors on each artifact?"
  - "Would the rendered decision-table report be clinically useful to an SME reviewing the logic?"
