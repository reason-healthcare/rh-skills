prompt: |
  Use the rh-inf-extract skill for the topic `anticoagulation-management`.

  Working directory: {workdir}
  Topic: {topic}

  One source is fully ingested: `aha-anticoag-afib-2023`. It contains
  **deeply nested decision logic** across 5 levels:
  1. CHA₂DS₂-VASc score → anticoagulation eligibility
  2. Valve status → drug class selection (DOAC vs warfarin)
  3. Renal function (CrCl) → specific DOAC selection and dose adjustment
  4. HAS-BLED score → bleeding risk modification and monitoring intensity
  5. Periprocedural bridging decisions based on thromboembolic risk + drug class

  Plus special population modifiers (elderly, obesity, CKD/dialysis) that
  cross-cut the main logic.

  Run the full extract cycle:
  1. **plan** — generate an extract plan identifying artifact candidates;
     the agent SHOULD recognize that this source requires MULTIPLE
     decision-table artifacts to capture the layered logic (e.g., one for
     initiation/drug selection, one for periprocedural bridging) rather than
     cramming everything into a single flat table
  2. Wait for reviewer approval (simulate approval by responding "approved")
  3. **implement** — produce the L2 structured artifacts via rh-skills promote derive
  4. **verify** — validate each artifact with rh-skills validate

