  - path: topics/imaging-prior-auth/process/plans/extract-plan.yaml
    checks:
      - exists
      - contains: "policy"
      - contains: "decision-table"
  - path: topics/imaging-prior-auth/structured
    checks:
      - exists
      - contains_any_file_with: "artifact_type: policy"
      - contains_any_file_with: "artifact_type: decision-table"
      - contains_any_file_with: "conditions:"
      - contains_any_file_with: "rules:"
      - contains_any_file_with: "criteria:"
  - path: tracking.yaml
    checks:
      - event: extract_planned
      - event: structured_derived

efficiency_focus:
  - "Does the agent recognize the decision table format as a decision-table artifact (not generic decision-points)?"
  - "Does the agent recognize the prior auth criteria as a policy artifact?"
  - "Does the agent recognize the step-by-step authorization process as a care-pathway?"
  - "Does it use rh-skills promote derive with correct artifact_type for each?"
  - "Does it avoid re-reading the source file more than once?"

quality_focus:
  - "Does the extract plan propose at least policy, decision-table, and care-pathway types?"
  - "Does the policy artifact contain applicability (payer_types, service_category, codes), criteria, and actions (approve/deny/pend)?"
  - "Does the decision-table artifact have correctly structured conditions with values, and rules with when/then mappings?"
  - "Are the 5 decision rules from the source accurately captured in the decision-table rules?"
  - "Does the decision-table use dash notation for irrelevant conditions (e.g., Rule 1 red flags=Yes, other conditions='-')?"
  - "Does the care-pathway artifact capture the 8-step authorization workflow?"
  - "Is evidence_traceability present linking claims to payer-mri-auth-policy-2024?"
  - "Does rh-skills validate report zero errors on each artifact?"
  - "Would running rh-skills render on the decision-table produce a meaningful completeness report?"
