    - path: sources/normalized/payer-mri-auth-policy-2024.md
      content: |
        # National Health Plan: Advanced Imaging Prior Authorization Policy

        Effective Date: January 1, 2024
        Policy Number: IMG-2024-001
        Applies To: Commercial and Medicare Advantage plans

        ## Applicability

        This policy applies to outpatient advanced imaging procedures including:
        - MRI (CPT 72148, 72149, 72158 — lumbar spine)
        - CT (CPT 72131, 72132, 72133 — lumbar spine)
        - PET/CT (CPT 78815, 78816)

        Service category: outpatient diagnostic imaging.

        Prior authorization is REQUIRED for all outpatient advanced imaging
        procedures listed above.

        ## Documentation Requirements

        The requesting provider must submit:
        1. Clinical indication and ICD-10 diagnosis code
        2. Duration of symptoms (must be ≥6 weeks for non-emergent)
        3. Conservative treatment history (physical therapy, medications)
        4. Results of prior imaging, if any
        5. Relevant physical examination findings

        ## Authorization Decision Table

        The following conditions determine the authorization decision:

        | Condition | Possible Values |
        |-----------|----------------|
        | Clinical indication documented | Yes / No |
        | Symptoms ≥ 6 weeks | Yes / No |
        | Conservative treatment attempted | Yes / No / N/A (red flags) |
        | Red flags present | Yes / No |

        ### Decision Rules

        Rule 1: If red flags present = Yes → APPROVE (regardless of other conditions)
          Red flags include: progressive neurological deficit, cauda equina syndrome,
          suspected malignancy, fracture, infection.

        Rule 2: If clinical indication = No → DENY
          Reason: Insufficient clinical documentation.

        Rule 3: If clinical indication = Yes AND symptoms ≥ 6 weeks = Yes
          AND conservative treatment attempted = Yes → APPROVE

        Rule 4: If clinical indication = Yes AND symptoms ≥ 6 weeks = Yes
          AND conservative treatment attempted = No → PEND
          Request: Documentation of why conservative treatment was not attempted.

        Rule 5: If clinical indication = Yes AND symptoms ≥ 6 weeks = No
          AND red flags = No → DENY
          Reason: Symptoms duration does not meet minimum threshold.

        ### Actions

        - **APPROVE**: Issue authorization number; valid for 60 days.
        - **DENY**: Issue denial with appeal rights per state and federal regulations.
          Member and provider receive written notification within 2 business days.
        - **PEND**: Request additional documentation. Provider has 14 calendar days
          to submit. If not received, auto-deny applies.

        ## Authorization Workflow

        1. Provider submits prior auth request via portal or fax
        2. Intake specialist verifies member eligibility and plan coverage
        3. Clinical reviewer applies decision table criteria
        4. If APPROVE: generate auth number, notify provider
        5. If DENY: generate denial letter with clinical rationale and appeal instructions
        6. If PEND: send documentation request to provider; set 14-day timer
        7. After additional documentation received: re-apply decision table
        8. Quality audit: 10% random sample reviewed monthly

