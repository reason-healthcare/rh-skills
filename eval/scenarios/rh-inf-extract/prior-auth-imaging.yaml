prompt: |
  Use the rh-inf-extract skill for the topic `imaging-prior-auth`.

  Working directory: {workdir}
  Topic: {topic}

  One source is fully ingested: `payer-mri-auth-policy-2024`. It contains:
  - Prior authorization policy with applicability, criteria, and actions
  - An explicit decision table with conditions, rules, and outcomes
  - A workflow describing the authorization process steps

  Run the full extract cycle:
  1. **plan** — generate an extract plan identifying artifact candidates;
     the plan SHOULD propose at least a `policy` artifact, a `decision-table`
     artifact, and a `care-pathway` artifact
  2. Wait for reviewer approval (simulate approval by responding "approved")
  3. **implement** — produce the L2 structured artifacts via rh-skills promote derive
  4. **verify** — validate each artifact with rh-skills validate

