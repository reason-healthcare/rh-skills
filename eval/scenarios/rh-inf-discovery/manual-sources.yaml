name: manual-sources
skill: rh-inf-discovery
description: >
  The user has pre-placed source files in sources/ before running discovery.
  The agent must detect untracked files using `rh-skills source scan`, inspect
  their contents, and incorporate the relevant ones into the discovery plan as
  manual sources before proceeding with network searches.

topic: young-adult-hypertension

workspace:
  tracking_yaml: |
    topics:
      young-adult-hypertension:
        state: initialized
        events:
          - event: topic_initialized
            timestamp: "2026-04-15T00:00:00Z"
    sources: []

  files:
    - path: RESEARCH.md
      content: |
        # Research Focus

        **Topic:** young-adult-hypertension
        **Clinical question:** What are the diagnostic thresholds, treatment
        targets, and lifestyle interventions for hypertension in adults aged 18–39?

        ## Scope
        - Adults aged 18–39
        - US care delivery context
        - Emphasis on ACC/AHA 2017 thresholds versus older JNC-7 criteria
        - CMS quality measure alignment (HEDIS, eCQMs)
        - SDOH considerations (food insecurity, housing stability)

    - path: sources/uspstf-htn-screening-adults-2021.md
      content: |
        # USPSTF Hypertension in Adults: Screening (2021)

        **Source:** U.S. Preventive Services Task Force
        **Year:** 2021
        **Grade:** B (adults 18+)
        **URL:** https://www.uspreventiveservicestaskforce.org/uspstf/recommendation/hypertension-in-adults-screening

        ## Summary

        The USPSTF recommends screening for hypertension in adults 18 years or
        older. Screening should be obtained by measurement outside of a clinical
        setting for diagnostic confirmation before starting treatment.

        ## Key Points

        - Grade B recommendation for all adults ≥ 18
        - Ambulatory blood pressure monitoring (ABPM) is the reference standard
          for confirming diagnosis
        - Office-based measurement ≥ 130/80 mmHg warrants confirmation
        - Young adults (18–39) with no risk factors may be screened less frequently
          (every 3–5 years for those with normal BP)

        ## Relevance to Young Adults

        While overall guidance applies to all adults ≥ 18, the task force notes
        that prevalence rises with age; targeted outreach to young adults at risk
        (obesity, family history, race/ethnicity disparities) is warranted.

    - path: sources/cdc-htn-prevalence-adults-2023.csv
      content: |
        age_group,sex,race_ethnicity,htn_prevalence_pct,n_surveyed,survey_year,source
        18-24,Both,All,7.5,4821,2021-2022,NHANES
        25-34,Both,All,14.2,5103,2021-2022,NHANES
        35-44,Both,All,26.8,4956,2021-2022,NHANES
        18-24,Male,All,9.1,2412,2021-2022,NHANES
        18-24,Female,All,5.8,2409,2021-2022,NHANES
        25-34,Male,All,17.3,2551,2021-2022,NHANES
        25-34,Female,All,11.0,2552,2021-2022,NHANES
        35-44,Male,All,29.4,2478,2021-2022,NHANES
        35-44,Female,All,24.2,2478,2021-2022,NHANES
        18-34,Both,Non-Hispanic Black,21.6,1842,2021-2022,NHANES
        18-34,Both,Non-Hispanic White,10.4,2301,2021-2022,NHANES
        18-34,Both,Hispanic,11.8,2187,2021-2022,NHANES

prompt: |
  Use the rh-inf-discovery skill in **session** mode for the topic
  `young-adult-hypertension`.

  Working directory: {workdir}
  Topic: {topic}

  The RESEARCH.md file describes the clinical question. The user has also
  pre-placed two source files in sources/ before starting the discovery session:
    - sources/uspstf-htn-screening-adults-2021.md  (a local copy of the USPSTF recommendation summary)
    - sources/cdc-htn-prevalence-adults-2023.csv   (CDC/NHANES prevalence data by age/sex/race)

  These files are NOT yet registered in tracking.yaml.

  Expected behavior:
  1. The agent runs `rh-skills source scan` and detects both files as UNTRACKED
  2. The agent inspects each file (head/cat), assesses relevance, and adds them
     to the discovery plan as `access: manual` sources using `rh-skills source add`
  3. The agent then proceeds with network searches (PubMed, ClinicalTrials, etc.)
     to complete the plan
  4. The final discovery-plan.yaml should include both manually placed files
     alongside the network-discovered sources

quality_items:
  - "Step 0 scan: agent ran `rh-skills source scan` and identified 2 untracked files"
  - "Manual sources: both uspstf-htn-screening-adults-2021 and cdc-htn-prevalence-adults-2023 added to plan with access: manual"
  - "Type accuracy: USPSTF file typed as clinical-guideline or document; CDC CSV typed as dataset"
  - "Plan completeness: plan has ≥ 6 total sources including the 2 manual ones"
  - "Validation: `rh-skills validate` passes with no errors"
  - "No duplication: manual sources not also searched for online (they're already present)"
