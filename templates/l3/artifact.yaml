artifact_schema_version: "1.0"    # required — do not change

metadata:                           # all sub-fields required
  id: REPLACE_WITH_ARTIFACT_ID      # kebab-case unique ID
  name: REPLACE_WITH_ARTIFACT_NAME  # short machine name
  title: "REPLACE WITH HUMAN TITLE"
  version: "1.0.0"
  status: draft                     # draft | active | retired
  domain: REPLACE_WITH_DOMAIN       # e.g. diabetes, sepsis
  created_date: "YYYY-MM-DD"        # ISO 8601 date
  description: |
    Replace with a clear description of this computable artifact.

converged_from:                     # list of L2 artifact names (required)
  - REPLACE_WITH_L2_ARTIFACT_NAME

